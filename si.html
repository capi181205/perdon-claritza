<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gracias</title>
</head>
<body>

    <!-- 🎵 AUDIO -->
    <audio id="musica" autoplay loop muted>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <img src="gato4.gif" width="200">
        <h1>"GRACIAS POR DECIR QUE SÍ" 🥳 ❤️</h1>
        <p>"Te Amo Mucho GORDA DE MI VIDA" 😍 ✨</p>
    </div>

    <!-- ⚡ ACTIVAR AUDIO -->
    <script>
        const audio = document.getElementById("musica");

        function activarAudio() {
            audio.muted = false;
            audio.volume = 0.3;
            audio.play();
        }

        document.addEventListener("click", activarAudio);
        document.addEventListener("mousemove", activarAudio, { once: true });
    </script>

</body>
</html>
