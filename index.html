<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Para Claritza</title>
</head>
<body>

    <div class="container">

        <!-- GIF -->
        <img src="gato1.gif" width="200">

        <!-- AUDIO -->
        <audio id="musica" autoplay loop muted>
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <h1>¿CLARITZA ME PERDONAS? 🌹 🥺</h1>
        <p>Te Extraño Mucho Mi Amor 💞 ❤️</p>

        <div class="btn">
            <a href="si.html">SI</a>
            <a href="no1.html">NO</a>
        </div>

    </div>

    <!-- ACTIVAR AUDIO -->
    <script>
        const audio = document.getElementById("musica");

        // activar con click
        document.addEventListener("click", () => {
            audio.muted = false;
            audio.volume = 0.3;
            audio.play();
        });

        // activar con movimiento (por si no hacen click)
        document.addEventListener("mousemove", () => {
            audio.muted = false;
            audio.volume = 0.3;
            audio.play();
        }, { once: true });
    </script>

</body>
</html>
