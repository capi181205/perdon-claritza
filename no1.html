<body>

    <!-- 🎵 AUDIO -->

    <!-- ⚡ ACTIVAR AUDIO -->
    <script>
        const audio = document.getElementById("musica");

        function activarAudio() {
            audio.muted = false;
            audio.volume = 0.3;
            audio.play();
        }

        document.addEventListener("click", activarAudio);
        document.addEventListener("mousemove", activarAudio, { once: true });
    </script>

</body>
